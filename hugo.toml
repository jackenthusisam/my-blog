baseURL = 'https://my-blog-bed.pages.dev/'
languageCode = 'zh-cn'
title = '我的博客'
theme = 'PaperMod'

[params]
  description = "个人博客"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true

[params.homeInfoParams]
  Title = "你好 👋"
  Content = "欢迎来到我的博客"

[socialIcons]
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/jackenthusisam"

[menu]
  main = [
    {identifier = "archives", name = "归档", url = "/archives", weight = 10},
    {identifier = "search", name = "搜索", url = "/search", weight = 20},
    {identifier = "tags", name = "标签", url = "/tags", weight = 30},
  ]

[outputs]
  home = ["HTML", "RSS", "JSON"]
